<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kitfind — Skill Discovery Index</title>
<link rel="icon" type="image/png" href="kitfind-logo.png">
<style>
  :root {
    --bg: #0f172a;
    --surface: #1e293b;
    --border: #334155;
    --text: #e2e8f0;
    --muted: #94a3b8;
    --teal: #2dd4bf;
    --amber: #f59e0b;
    --teal-dim: rgba(45,212,191,0.1);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    line-height: 1.5;
  }
  .container { max-width: 960px; margin: 0 auto; padding: 24px 16px; }

  /* Header */
  header {
    display: flex; align-items: center; gap: 16px;
    padding: 24px 0; border-bottom: 1px solid var(--border); margin-bottom: 24px;
  }
  header img { width: 48px; height: 48px; border-radius: 12px; }
  header h1 { font-size: 24px; color: var(--teal); }
  header span { color: var(--muted); font-size: 14px; }

  /* Stats row */
  .stats { display: flex; gap: 24px; flex-wrap: wrap; margin-bottom: 24px; }
  .stat-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 12px; padding: 16px 24px; flex: 1; min-width: 120px;
  }
  .stat-card .num { font-size: 28px; font-weight: 700; color: var(--teal); }
  .stat-card .label { font-size: 12px; text-transform: uppercase; letter-spacing: 1px; color: var(--muted); }

  /* Search */
  .search-box {
    width: 100%; padding: 14px 18px;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 12px; color: var(--text); font-size: 16px;
    outline: none; transition: border-color 0.15s; margin-bottom: 8px;
  }
  .search-box:focus { border-color: var(--teal); }
  .search-box::placeholder { color: var(--muted); }
  .search-controls { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 20px; }
  .filter-btn {
    padding: 6px 14px; border-radius: 20px; border: 1px solid var(--border);
    background: transparent; color: var(--muted); font-size: 13px; cursor: pointer;
    transition: all 0.15s;
  }
  .filter-btn:hover { border-color: var(--teal); color: var(--teal); }
  .filter-btn.active { background: var(--teal-dim); border-color: var(--teal); color: var(--teal); }

  /* Skill cards */
  .skill-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 12px; padding: 16px 20px; margin-bottom: 12px;
    transition: border-color 0.15s;
  }
  .skill-card:hover { border-color: var(--teal); }
  .skill-card h3 { font-size: 16px; color: var(--teal); margin-bottom: 4px; }
  .skill-card .source {
    font-size: 12px; color: var(--muted); margin-bottom: 8px;
    font-family: 'SF Mono', 'Fira Code', monospace;
  }
  .skill-card .desc { font-size: 14px; color: var(--text); margin-bottom: 8px; }
  .skill-card .meta { display: flex; gap: 6px; flex-wrap: wrap; }
  .skill-card .tag {
    padding: 2px 8px; border-radius: 4px; font-size: 11px;
    background: var(--teal-dim); color: var(--teal);
  }
  .skill-card .tag.domain { background: rgba(245,158,11,0.1); color: var(--amber); }
  .skill-card .tag.harness { background: rgba(99,102,241,0.1); color: #818cf8; }

  /* Empty state */
  .empty { text-align: center; padding: 60px 20px; color: var(--muted); }
  .empty p { font-size: 16px; }
  .empty .hint { font-size: 13px; margin-top: 8px; }

  /* Loading */
  .loading {
    text-align: center; padding: 60px 20px; color: var(--muted);
  }
  .loading .spinner {
    width: 32px; height: 32px; border: 3px solid var(--border);
    border-top-color: var(--teal); border-radius: 50%;
    animation: spin 0.8s linear infinite; margin: 0 auto 12px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Domains section */
  .domains { margin-top: 32px; }
  .domains h2 { font-size: 18px; margin-bottom: 12px; color: var(--teal); }
  .domain-row {
    display: flex; justify-content: space-between; align-items: center;
    padding: 8px 0; border-bottom: 1px solid var(--border); font-size: 14px;
  }
  .domain-row .count { color: var(--muted); font-size: 13px; }
  .domain-bar {
    height: 4px; background: var(--teal); border-radius: 2px; margin-top: 4px;
  }

  /* Footer */
  footer {
    margin-top: 48px; padding-top: 16px; border-top: 1px solid var(--border);
    font-size: 12px; color: var(--muted); text-align: center;
  }
  footer a { color: var(--teal); text-decoration: none; }
  footer a:hover { text-decoration: underline; }

  .hidden { display: none !important; }
</style>
</head>
<body>

<div class="container">
  <header>
    <img src="kitfind-logo.png" alt="Kitfind">
    <div>
      <h1>Kitfind</h1>
      <span>Skill discovery index — find the right skill for any task</span>
    </div>
  </header>

  <div class="stats" id="stats">
    <div class="stat-card">
      <div class="num" id="statSkills">-</div>
      <div class="label">Skills Indexed</div>
    </div>
    <div class="stat-card">
      <div class="num" id="statSources">-</div>
      <div class="label">Source Repos</div>
    </div>
    <div class="stat-card">
      <div class="num" id="statDomains">-</div>
      <div class="label">Domains</div>
    </div>
  </div>

  <input type="text" class="search-box" id="searchInput"
         placeholder="Search skills... e.g. 'debug async python worker'">

  <div id="loading" class="loading">
    <div class="spinner"></div>
    <p>Loading skill index...</p>
  </div>

  <div class="search-controls hidden" id="filters"></div>
  <div id="results" class="hidden"></div>

  <div class="domains hidden" id="domainsSection">
    <h2>Domains</h2>
    <div id="domainList"></div>
  </div>

  <footer>
    <span id="generatedAt"></span>
    <a href="https://github.com/gliptak/kitfind">gliptak/kitfind</a> &middot;
    Blob: <a href="index.json">index.json</a>
  </footer>
</div>

<script>
let SKILLS = [];
let CATALOG = null;

async function init() {

  // file:// can't fetch — show instructions
  if (location.protocol === 'file:') {
    document.getElementById('loading').innerHTML = '<div class="empty"><p>Serve via HTTP to load skills</p><p class="hint">Run <code>python3 -m http.server 8080 --directory site</code> then open <code>http://localhost:8080</code></p></div>';
    return;
  }
  try {
    const res = await fetch('index.json');
    const data = await res.json();
    SKILLS = data.skills || data;
    CATALOG = data.catalog || data;
    document.getElementById('loading').classList.add('hidden');
    document.getElementById('filters').classList.remove('hidden');
    document.getElementById('results').classList.remove('hidden');
    document.getElementById('domainsSection').classList.remove('hidden');
    showStats(CATALOG);
    buildDomainTable(CATALOG);
    buildFilters();
    onSearch();
    const gen = CATALOG.generated_at || (typeof data.generated_at === 'string' ? data.generated_at : '');
    if (gen) document.getElementById('generatedAt').textContent = 'Generated ' + gen.replace('T', ' ').replace(/\..+/, '') + ' &middot; ';
    document.getElementById('searchInput').addEventListener('input', onSearch);
  } catch (e) {
    document.getElementById('loading').innerHTML = '<div class="empty"><p>Failed to load skill index</p><p class="hint">' + e.message + '</p></div>';
  }
}

function showStats(catalog) {
  const stats = catalog.stats || {};
  document.getElementById('statSkills').textContent = (stats.total_skills || SKILLS.length).toLocaleString();
  document.getElementById('statSources').textContent = (stats.total_sources || 0).toLocaleString();
  const domains = stats.by_domain ? Object.keys(stats.by_domain).length : 0;
  document.getElementById('statDomains').textContent = domains.toLocaleString();
}

function buildDomainTable(catalog) {
  const byDomain = (catalog.stats && catalog.stats.by_domain) || {};
  const entries = Object.entries(byDomain).sort((a, b) => b[1] - a[1]);
  const total = catalog.stats ? catalog.stats.total_skills : SKILLS.length;
  const container = document.getElementById('domainList');
  container.innerHTML = entries.map(([domain, count]) =>
    '<div class="domain-row">' +
      '<div><span>' + esc(domain) + '</span>' +
        '<div class="domain-bar" style="width:' + (count / total * 100).toFixed(1) + '%"></div></div>' +
      '<span class="count">' + count + '</span>' +
    '</div>'
  ).join('');
}

function getDomains() {
  const d = new Set();
  SKILLS.forEach(s => { if (s.domain) d.add(s.domain); });
  return Array.from(d).sort();
}

function getHarnesses() {
  const h = new Set();
  SKILLS.forEach(s => { (s.harnesses || []).forEach(hh => h.add(hh)); });
  return Array.from(h).sort();
}

function onSearch() {
  const q = document.getElementById('searchInput').value.toLowerCase().trim();
  const activeDomain = document.querySelector('.filter-btn.domain.active');
  const activeHarness = document.querySelector('.filter-btn.harness.active');
  const domainFilter = activeDomain ? activeDomain.dataset.value : '';
  const harnessFilter = activeHarness ? activeHarness.dataset.value : '';
  renderResults(q, domainFilter, harnessFilter);
}

function matches(skill, query) {
  if (!query) return true;
  const haystack = [
    skill.name, skill.description,
    ...(skill.triggers || []),
    ...(skill.tags || []),
    skill.domain || '',
    skill.source?.url || '',
  ].join(' ').toLowerCase();
  return query.split(/\s+/).every(term => haystack.includes(term));
}

function renderResults(query, domainFilter, harnessFilter) {
  const container = document.getElementById('results');
  let filtered = SKILLS.filter(s => {
    if (domainFilter && s.domain !== domainFilter) return false;
    if (harnessFilter && !(s.harnesses || []).includes(harnessFilter)) return false;
    return matches(s, query);
  });

  if (query) {
    const q = query.toLowerCase();
    filtered.sort((a, b) => scoreSkill(b, q) - scoreSkill(a, q));
  }

  if (filtered.length === 0) {
    container.innerHTML = '<div class="empty"><p>No skills found</p><p class="hint">Try a different search term or clear filters</p></div>';
    return;
  }

  container.innerHTML = '<div style="margin-bottom:12px;font-size:13px;color:var(--muted)">' + filtered.length + ' result' + (filtered.length !== 1 ? 's' : '') + '</div>';
  let html = '';
  const batch = filtered.slice(0, 200);
  batch.forEach(s => {
    const triggers = (s.triggers || []).slice(0, 5);
    const tags = (s.tags || []).slice(0, 8);
    const harnesses = (s.harnesses || []).slice(0, 4);
    const sourcePath = s.source ? s.source.path : '';
    const sourceUrl = s.source ? githubBlobUrl(s.source) : '';
    const repoLabel = s.source ? s.source.url.replace('https://github.com/', '') : '';
    html += '<div class="skill-card">' +
      '<h3>' + esc(s.name) + '</h3>' +
      '<div class="source"><a href="' + esc(sourceUrl) + '" target="_blank">' + esc(sourcePath) + '</a> &middot; ' + esc(repoLabel) + '</div>' +
      '<div class="desc">' + esc(s.description) + '</div>' +
      '<div class="meta">' +
        (s.domain ? '<span class="tag domain">' + esc(s.domain) + '</span>' : '') +
        harnesses.map(h => '<span class="tag harness">' + esc(h) + '</span>').join('') +
        triggers.slice(0, 3).map(t => '<span class="tag">' + esc(t) + '</span>').join('') +
      '</div>' +
    '</div>';
  });
  container.innerHTML += html;
  if (filtered.length > 200) {
    container.innerHTML += '<div style="text-align:center;padding:16px;color:var(--muted);font-size:13px">Showing first 200 of ' + filtered.length + ' results. Narrow your search.</div>';
  }
}

function scoreSkill(s, q) {
  let score = 0;
  if (s.name && s.name.toLowerCase().includes(q)) score += 100;
  if (s.description && s.description.toLowerCase().includes(q)) score += 10;
  (s.triggers || []).forEach(t => { if (t.toLowerCase().includes(q)) score += 5; });
  (s.tags || []).forEach(t => { if (t.toLowerCase().includes(q)) score += 3; });
  if (s.domain && s.domain.toLowerCase().includes(q)) score += 2;
  return score;
}

function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

function githubBlobUrl(source) {
  const ownerRepo = source.url.replace('https://github.com/', '');
  return `https://github.com/${ownerRepo}/blob/${source.ref}/${source.path}/SKILL.md`;
}

function buildFilters() {
  const container = document.getElementById('filters');
  const domains = getDomains();
  domains.forEach(d => {
    const btn = document.createElement('button');
    btn.className = 'filter-btn domain';
    btn.dataset.value = d;
    btn.textContent = d;
    btn.onclick = () => {
      btn.classList.toggle('active');
      onSearch();
    };
    container.appendChild(btn);
  });
  const allBtn = document.createElement('button');
  allBtn.className = 'filter-btn';
  allBtn.textContent = 'Clear filters';
  allBtn.onclick = () => {
    document.querySelectorAll('.filter-btn.active').forEach(b => b.classList.remove('active'));
    document.getElementById('searchInput').value = '';
    onSearch();
  };
  container.appendChild(allBtn);
}

init();
</script>

</body>
</html>
