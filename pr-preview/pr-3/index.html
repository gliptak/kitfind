<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kitfind — Skill Discovery Index</title>
<link rel="icon" type="image/png" href="kitfind-logo.png">
<style>
  :root {
    --bg: #0f172a;
    --surface: #1e293b;
    --border: #334155;
    --text: #e2e8f0;
    --muted: #94a3b8;
    --teal: #2dd4bf;
    --teal-dim: rgba(45,212,191,0.1);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    line-height: 1.5;
  }
  .container { max-width: 960px; margin: 0 auto; padding: 24px 16px; }
  header {
    display: flex; align-items: center; gap: 16px;
    padding: 24px 0; border-bottom: 1px solid var(--border); margin-bottom: 24px;
  }
  header img { width: 48px; height: 48px; border-radius: 12px; }
  header h1 { font-size: 24px; color: var(--teal); }
  header span { color: var(--muted); font-size: 14px; }
  .stats { display: flex; gap: 24px; flex-wrap: wrap; margin-bottom: 24px; }
  .stat-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 12px; padding: 16px 24px; flex: 1; min-width: 120px;
  }
  .stat-card .num { font-size: 28px; font-weight: 700; color: var(--teal); }
  .stat-card .label { font-size: 12px; text-transform: uppercase; letter-spacing: 1px; color: var(--muted); }
  .search-box {
    width: 100%; padding: 14px 18px;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 12px; color: var(--text); font-size: 16px;
    outline: none; transition: border-color 0.15s; margin-bottom: 8px;
  }
  .search-box:focus { border-color: var(--teal); }
  .search-box::placeholder { color: var(--muted); }
  .search-tip {
    font-size: 12px; color: var(--muted); margin-bottom: 20px;
  }
  .skill-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 12px; padding: 16px 20px; margin-bottom: 12px;
    transition: border-color 0.15s;
  }
  .skill-card:hover { border-color: var(--teal); }
  .skill-card h3 { font-size: 16px; color: var(--teal); margin-bottom: 4px; }
  .skill-card .score {
    float: right; font-size: 11px; color: var(--muted); margin-top: 2px;
  }
  .skill-card .source {
    font-size: 12px; color: var(--muted); margin-bottom: 8px;
    font-family: 'SF Mono', 'Fira Code', monospace;
  }
  .skill-card .source a { color: var(--muted); }
  .skill-card .source a:hover { color: var(--teal); }
  .skill-card .desc { font-size: 14px; color: var(--text); margin-bottom: 8px; }
  .skill-card .meta { display: flex; gap: 6px; flex-wrap: wrap; }
  .skill-card .tag {
    padding: 2px 8px; border-radius: 4px; font-size: 11px;
    background: var(--teal-dim); color: var(--teal);
  }
  .skill-card .tag.harness { background: rgba(99,102,241,0.1); color: #818cf8; }
  .empty { text-align: center; padding: 60px 20px; color: var(--muted); }
  .empty p { font-size: 16px; }
  .empty .hint { font-size: 13px; margin-top: 8px; }
  .loading {
    text-align: center; padding: 60px 20px; color: var(--muted);
  }
  .loading .spinner {
    width: 32px; height: 32px; border: 3px solid var(--border);
    border-top-color: var(--teal); border-radius: 50%;
    animation: spin 0.8s linear infinite; margin: 0 auto 12px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  footer {
    margin-top: 48px; padding-top: 16px; border-top: 1px solid var(--border);
    font-size: 12px; color: var(--muted); text-align: center;
  }
  footer a { color: var(--teal); text-decoration: none; }
  footer a:hover { text-decoration: underline; }
  .hidden { display: none !important; }
</style>
</head>
<body>

<div class="container">
  <header>
    <img src="kitfind-logo.png" alt="Kitfind">
    <div>
      <h1>Kitfind</h1>
      <span>Skill discovery index — find the right skill for any task</span>
    </div>
  </header>

  <div class="stats" id="stats">
    <div class="stat-card">
      <div class="num" id="statSkills">-</div>
      <div class="label">Skills Indexed</div>
    </div>
    <div class="stat-card">
      <div class="num" id="statSources">-</div>
      <div class="label">Source Repos</div>
    </div>
    <div class="stat-card">
      <div class="num" id="statModelStatus">-</div>
      <div class="label" id="statModelLabel">Semantic Search</div>
    </div>
  </div>

  <input type="text" class="search-box" id="searchInput"
         placeholder="Search skills... e.g. 'debug async python worker'">
  <div class="search-tip" id="searchTip"></div>

  <div id="loading" class="loading">
    <div class="spinner"></div>
    <p>Loading skill index...</p>
  </div>

  <div id="results" class="hidden"></div>

  <footer>
    <span id="generatedAt"></span>
    <a href="https://github.com/gliptak/kitfind">gliptak/kitfind</a> &middot;
    Blob: <a href="index.json">index.json</a>
  </footer>
</div>

<script type="importmap">
{
  "imports": {
    "@xenova/transformers": "https://cdn.jsdelivr.net/npm/@xenova/transformers@2.17.2/dist/transformers.min.js"
  }
}
</script>
<script type="module">
import { pipeline, env } from '@xenova/transformers';

let SKILLS = [];
let EMBEDDINGS = null;  // Flat Float32Array of skill embeddings
let EMBED_N = 0;
let EMBED_DIM = 0;
let MODEL_READY = false;
let MODEL_LOADING = false;

async function loadEmbeddings() {
  const res = await fetch('index.embeddings');
  const buf = await res.arrayBuffer();
  const header = new Int32Array(buf, 0, 3);
  EMBED_DIM = header[1];
  EMBED_N = header[2];
  const mins = new Float32Array(buf, 12, EMBED_DIM);
  const scales = new Float32Array(buf, 12 + EMBED_DIM * 4, EMBED_DIM);
  const quantized = new Uint8Array(buf, 12 + EMBED_DIM * 8);
  EMBEDDINGS = new Float32Array(EMBED_N * EMBED_DIM);
  for (let i = 0; i < EMBED_N * EMBED_DIM; i++) {
    const d = i % EMBED_DIM;
    EMBEDDINGS[i] = quantized[i] * scales[d] + mins[d];
  }
}

async function loadModel() {
  MODEL_LOADING = true;
  try {
    env.localModelPath = './model/';
    const pipe = await pipeline('feature-extraction', './model/', {
      quantized: true,
      progress_callback: (p) => {
        if (p.status === 'progress') {
          const ms = document.getElementById('statModelStatus');
          const ml = document.getElementById('statModelLabel');
          if (ms) ms.textContent = Math.round(p.progress * 100) + '%';
          if (ml) ml.textContent = 'Downloading model...';
        }
      },
    });
    MODEL_READY = true;
    MODEL_LOADING = false;
    const ms = document.getElementById('statModelStatus');
    const ml = document.getElementById('statModelLabel');
    if (ms) ms.textContent = 'Ready';
    if (ml) ml.textContent = 'Semantic Search';
    window.__PIPE = pipe;
  } catch (e) {
    MODEL_LOADING = false;
    const ms = document.getElementById('statModelStatus');
    const ml = document.getElementById('statModelLabel');
    if (ms) ms.textContent = 'Unavailable';
    if (ml) ml.textContent = 'Semantic Search';
    window.__PIPE = null;
  }
}

async function init() {
  if (location.protocol === 'file:') {
    document.getElementById('loading').innerHTML = '<div class="empty"><p>Serve via HTTP to load skills</p><p class="hint">Run <code>python3 -m http.server 8080 --directory site</code> then open <code>http://localhost:8080</code></p></div>';
    return;
  }
  try {
    const [skillsRes, embedRes] = await Promise.all([
      fetch('index.json'),
      fetch('index.embeddings'),
    ]);
    const data = await skillsRes.json();
    SKILLS = data.skills || data;
    await loadEmbeddings();
    document.getElementById('loading').classList.add('hidden');
    document.getElementById('results').classList.remove('hidden');
    showStats(data);
    onSearch();
    const gen = data.catalog?.generated_at || data.generated_at || '';
    if (gen) document.getElementById('generatedAt').textContent = 'Generated ' + gen.replace('T', ' ').replace(/\..+/, '') + ' &middot; ';
    document.getElementById('searchInput').addEventListener('input', onSearch);
    // Start loading model in background
    loadModel();
  } catch (e) {
    document.getElementById('loading').innerHTML = '<div class="empty"><p>Failed to load skill index</p><p class="hint">' + e.message + '</p></div>';
  }
}

function showStats(data) {
  const stats = data.catalog?.stats || {};
  document.getElementById('statSkills').textContent = (stats.total_skills || SKILLS.length).toLocaleString();
  document.getElementById('statSources').textContent = (stats.total_sources || 0).toLocaleString();
}

function onSearch() {
  const q = document.getElementById('searchInput').value.toLowerCase().trim();
  renderResults(q);
}

function matches(skill, query) {
  if (!query) return true;
  const haystack = [
    skill.name, skill.description,
    ...(skill.triggers || []),
    ...(skill.tags || []),
    skill.domain || '',
    skill.source?.url || '',
  ].join(' ').toLowerCase();
  return query.split(/\s+/).every(term => haystack.includes(term));
}

async function embedQuery(query) {
  const pipe = window.__PIPE;
  if (!pipe) return null;
  try {
    const result = await pipe(query, { pooling: 'mean', normalize: true });
    return Array.from(result.data);
  } catch {
    return null;
  }
}

async function renderResults(query) {
  const container = document.getElementById('results');
  const tip = document.getElementById('searchTip');
  let filtered = SKILLS.filter(s => matches(s, query));

  if (filtered.length === 0 && !query) {
    tip.textContent = '';
    if (MODEL_LOADING && !MODEL_READY) {
      const ms = document.getElementById('statModelStatus');
      const ml = document.getElementById('statModelLabel');
      if (ms) ms.textContent = '...';
      if (ml) ml.textContent = 'Downloading model';
      container.innerHTML = '<div class="empty"><p>Loading skills...</p></div>';
    } else {
      container.innerHTML = '<div class="empty"><p>No skills loaded</p></div>';
    }
    return;
  }
  if (filtered.length === 0) {
    tip.textContent = '';
    container.innerHTML = '<div class="empty"><p>No skills found</p><p class="hint">Try a different search term</p></div>';
    return;
  }

  const pct = Math.round(filtered.length / SKILLS.length * 100);

  if (query && MODEL_READY && EMBEDDINGS) {
    const qvec = await embedQuery(query);
    if (qvec) {
      const scored = filtered.map((s, _) => {
        const idx = SKILLS.indexOf(s);
        let dot = 0;
        const offset = idx * EMBED_DIM;
        for (let j = 0; j < EMBED_DIM; j++) {
          dot += qvec[j] * EMBEDDINGS[offset + j];
        }
        return { skill: s, score: Math.max(0, dot) };
      });
      scored.sort((a, b) => b.score - a.score);
      const maxScore = scored.length > 0 ? Math.max(scored[0].score, 0.001) : 1;
      tip.textContent = `${filtered.length} of ${SKILLS.length} skills match (${pct}%) &middot; Semantic search`;
      container.innerHTML = '';
      const batch = scored.slice(0, 200);
      let html = '';
      batch.forEach(e => html += cardHtml(e.skill, Math.round(e.score / maxScore * 100)));
      container.innerHTML = html;
      if (filtered.length > 200) {
        container.innerHTML += '<div style="text-align:center;padding:16px;color:var(--muted);font-size:13px">Showing first 200 of ' + filtered.length + ' results. Narrow your search.</div>';
      }
      return;
    }
  }

  // Fallback: alphabetical (no model yet)
  const status = MODEL_LOADING ? ' &middot; Loading model...' : '';
  tip.textContent = `${SKILLS.length} skills indexed${status}`;
  container.innerHTML = '';
  let html = '';
  filtered.slice(0, 200).forEach(s => html += cardHtml(s, null));
  container.innerHTML = html;
}

function cardHtml(s, score) {
  const triggers = (s.triggers || []).slice(0, 5);
  const harnesses = (s.harnesses || []).slice(0, 4);
  const sourcePath = s.source ? s.source.path : '';
  const sourceUrl = s.source ? githubBlobUrl(s.source) : '';
  const repoLabel = s.source ? s.source.url.replace('https://github.com/', '') : '';
  const badge = score !== null ? '<span class="score">' + score + '%</span>' : '';
  return '<div class="skill-card">' +
    '<h3>' + esc(s.name) + badge + '</h3>' +
    '<div class="source"><a href="' + esc(sourceUrl) + '" target="_blank">' + esc(sourcePath) + '</a> &middot; ' + esc(repoLabel) + '</div>' +
    '<div class="desc">' + esc(s.description) + '</div>' +
    '<div class="meta">' +
      harnesses.map(h => '<span class="tag harness">' + esc(h) + '</span>').join('') +
      triggers.map(t => '<span class="tag">' + esc(t) + '</span>').join('') +
    '</div>' +
  '</div>';
}

function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

function githubBlobUrl(source) {
  const ownerRepo = source.url.replace('https://github.com/', '');
  return `https://github.com/${ownerRepo}/blob/${source.ref}/${source.path}/SKILL.md`;
}

init();
</script>

</body>
</html>
