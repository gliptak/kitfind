# kitfind.toml — curated list of skills repos to index
#
# Each entry is a git repository that contains SKILL.md files.
# Ref is pinned for reproducibility — update manually or via bot PR.
# Skills are discovered by scanning for SKILL.md files under the repo.

version = 1

[[repos]]
url = "https://github.com/obra/superpowers"
ref = "main"
description = "Agentic skills framework & software development methodology"

[[repos]]
url = "https://github.com/sickn33/antigravity-awesome-skills"
ref = "main"
description = "1,400+ agentic skills for Claude Code, Cursor, Codex, Gemini CLI, and more"

[[repos]]
url = "https://github.com/mattpocock/skills"
ref = "main"
description = "Skills for real engineers — TDD, design, debugging, productivity"

[[repos]]
url = "https://github.com/affaan-m/everything-claude-code"
ref = "main"
description = "ECC Tools — agent harness performance optimization system"

[[repos]]
url = "https://github.com/le-diegz/claude-skills-registry"
ref = "main"
description = "Open-source registry of reusable Claude skills"
