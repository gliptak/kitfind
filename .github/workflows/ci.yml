name: CI + Preview

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    types: [opened, reopened, synchronize, closed]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: preview-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v8
      - name: Build and validate
        run: uv sync --all-extras && uv run tools/build.py && uv run python tools/validate.py --all
      - name: Type check
        run: uv run mypy tools/build.py tools/validate.py
      - name: JS tests
        run: node --test tools/tests/search.test.mjs
      - name: Template JS syntax
        run: uv run python tools/validate.py --html
      - name: Upload site artifact
        uses: actions/upload-artifact@v7
        with:
          name: site
          path: site/

  preview:
    needs: build
    if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v6
      - name: Download site artifact
        uses: actions/download-artifact@v8
        with:
          name: site
          path: site/
      - name: Deploy preview
        uses: rossjrw/pr-preview-action@v1
        with:
          source-dir: ./site
          preview-branch: gh-pages
          umbrella-dir: pr-preview
          comment: true
